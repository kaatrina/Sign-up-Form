<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="left">
        <div class="logo">
          <img src="odin-logo.png" width="60px" height="80px" />
            <div class="name">
          <h1>ODIN</h1> </div>
        </div>
      </div>

      <div class="right">
        <div class="text_one">
          <p>
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams. Sign up
            <em>now</em> to get started.
          </p>
          <p>You <em>know</em> you want to.</p>
        </div>

        <div class="form">
          <h2>Let's do this!</h2>
          <form id="welcome" action="#" method="get">
            <div class="vvod">
              <label for="name">FIRST NAME</label>
              <input type="text" id="name" name="name" required />
            </div>

            <div class="vvod">
              <label for="surname">LAST NAME</label>
              <input type="text" id="surname" name="surname" required />
            </div>

            <div class="vvod">
              <label for="mail">EMAIL</label>
              <input type="email" id="mail" name="mail" required />
            </div>

            <div class="vvod">
              <label for="number">PHONE NUMBER</label>
              <input
                type="tel"
                id="number"
                name="number"
                required
                pattern="[0-9]+"
              />
            </div>

            <div class="vvod">
              <label for="password">PASSWORD</label>
              <input
                type="password"
                id="password"
                name="password"
                minlength="8"
                maxlength="8"
                required
              />
            </div>

            <div class="vvod">
              <label for="confirm_password">CONFIRM PASSWORD</label>
              <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                minlength="8"
                maxlength="8"
                required
              />
            </div>
          </form>
        </div>

        <div class="text_two">
          <button type="submit" form="welcome">Create Account</button>
          <div class="link">
            <p>Already have an account?</p>
            <a
              href="https://developer.mozilla.org/ru/docs/Learn_web_development/Core/Scripting/What_is_JavaScript"
            >Log in</a>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
